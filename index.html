<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valhalla's Gate — Mundo Viking</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#0a0604;font-family:'Cinzel',serif;}
#canvas-container{width:100vw;height:100vh;display:none;}
canvas{display:block;}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#login-bg{position:absolute;inset:0;background:linear-gradient(180deg,#050208 0%,#180c16 28%,#2a1406 58%,#180606 100%);}
#stars-canvas{position:absolute;inset:0;pointer-events:none;}
#aurora{position:absolute;top:0;left:0;width:100%;height:55%;background:linear-gradient(180deg,rgba(0,200,120,0.08) 0%,rgba(0,100,220,0.05) 35%,rgba(140,0,200,0.04) 65%,transparent 100%);animation:awave 9s ease-in-out infinite;filter:blur(22px);}
#aurora2{position:absolute;top:8%;left:0;width:100%;height:45%;background:linear-gradient(180deg,rgba(0,240,160,0.05) 0%,rgba(60,0,200,0.06) 45%,transparent 100%);animation:awave 12s ease-in-out infinite reverse;filter:blur(32px);}
@keyframes awave{0%,100%{transform:scaleX(1) skewY(0deg);opacity:0.6;}50%{transform:scaleX(1.08) skewY(-2deg);opacity:1;}}
#fire-glow{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:700px;height:220px;background:radial-gradient(ellipse at 50% 100%,rgba(255,110,0,0.22),transparent 70%);pointer-events:none;}
#mountains-svg{position:absolute;bottom:0;left:0;width:100%;height:48%;pointer-events:none;}

/* Login Card */
#login-card{position:relative;z-index:10;width:min(420px,93vw);background:rgba(6,3,1,0.9);border:1px solid rgba(200,140,30,0.38);border-radius:3px;padding:46px 40px 38px;box-shadow:0 0 70px rgba(180,90,0,0.12),0 0 130px rgba(180,90,0,0.06),inset 0 1px 0 rgba(200,140,30,0.18);backdrop-filter:blur(10px);}
#login-card::before{content:'';position:absolute;top:-1px;left:-1px;width:22px;height:22px;border-top:2px solid rgba(200,140,30,0.55);border-left:2px solid rgba(200,140,30,0.55);}
#login-card::after{content:'';position:absolute;bottom:-1px;right:-1px;width:22px;height:22px;border-bottom:2px solid rgba(200,140,30,0.55);border-right:2px solid rgba(200,140,30,0.55);}
.emblem{text-align:center;margin-bottom:6px;}
.emblem svg{width:76px;height:76px;filter:drop-shadow(0 0 14px rgba(245,175,35,0.5));}
.login-title{font-family:'Cinzel Decorative',serif;font-size:27px;font-weight:700;color:#f5c030;text-align:center;letter-spacing:3px;text-shadow:0 0 24px rgba(245,180,40,0.38),0 2px 0 #200e00;margin-bottom:4px;line-height:1.2;}
.login-sub{font-size:10px;color:rgba(200,160,80,0.65);text-align:center;letter-spacing:5px;text-transform:uppercase;margin-bottom:28px;}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:26px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,140,30,0.38),transparent);}
.divider span{font-size:15px;color:rgba(200,140,30,0.55);letter-spacing:5px;}
.field-group{margin-bottom:16px;}
.field-label{display:block;font-size:9px;letter-spacing:3px;color:rgba(200,160,80,0.55);margin-bottom:7px;font-family:'Cinzel',serif;}
.field-input{width:100%;background:rgba(255,255,255,0.035);border:1px solid rgba(200,140,30,0.22);border-radius:2px;padding:11px 15px;color:#e8d4a0;font-size:13px;font-family:'Cinzel',serif;letter-spacing:1px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.field-input::placeholder{color:rgba(200,160,80,0.22);font-size:11px;}
.field-input:focus{border-color:rgba(200,140,30,0.6);box-shadow:0 0 18px rgba(200,100,0,0.14),inset 0 0 8px rgba(200,100,0,0.04);}
.enter-btn{width:100%;padding:13px;margin-top:6px;background:linear-gradient(180deg,#c87810,#8a4800);border:1px solid rgba(245,180,40,0.38);border-radius:2px;color:#fff8e0;font-family:'Cinzel Decorative',serif;font-size:13px;letter-spacing:3px;cursor:pointer;transition:all 0.14s;position:relative;overflow:hidden;text-shadow:0 1px 0 rgba(0,0,0,0.4);}
.enter-btn:hover{background:linear-gradient(180deg,#e08820,#a05600);box-shadow:0 0 22px rgba(200,100,0,0.38);transform:translateY(-1px);}
.enter-btn:active{transform:translateY(1px);}
#login-error{font-size:11px;color:#e06040;text-align:center;margin-top:11px;letter-spacing:1px;min-height:16px;font-family:'Cinzel',serif;display:none;}
.guest-link{text-align:center;margin-top:18px;font-size:10px;color:rgba(200,160,80,0.38);letter-spacing:2px;cursor:pointer;transition:color 0.2s;font-family:'Cinzel',serif;}
.guest-link:hover{color:rgba(200,160,80,0.8);}
.rune-footer{text-align:center;margin-top:22px;font-size:17px;letter-spacing:8px;color:rgba(200,140,30,0.18);font-family:Georgia,serif;}

/* ── LOADING ── */
#loading-screen{position:fixed;inset:0;z-index:90;background:#080402;display:none;align-items:center;justify-content:center;flex-direction:column;gap:22px;}
.loading-rune{font-size:58px;animation:rspin 2.4s linear infinite;filter:drop-shadow(0 0 16px rgba(245,180,40,0.55));}
@keyframes rspin{to{transform:rotate(360deg);}}
.loading-title{font-family:'Cinzel Decorative',serif;font-size:20px;color:#f5c030;letter-spacing:4px;text-shadow:0 0 20px rgba(245,180,40,0.45);}
.loading-bar-wrap{width:260px;height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
.loading-bar{height:100%;width:0;background:linear-gradient(90deg,#c87810,#f5c030);border-radius:2px;transition:width 0.12s;}
.loading-msg{font-size:10px;color:rgba(200,160,80,0.48);letter-spacing:3px;font-family:'Cinzel',serif;}
.loading-welcome{font-family:'Cinzel',serif;font-size:15px;color:#e8d490;letter-spacing:2px;margin-top:2px;}

/* ── HUD ── */
#ui-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;display:none;}
#nameplate{position:absolute;top:18px;left:50%;transform:translateX(-50%);background:rgba(5,2,1,0.82);border:1px solid rgba(200,140,30,0.32);border-radius:3px;padding:8px 22px;text-align:center;box-shadow:0 0 22px rgba(0,0,0,0.5);}
#nameplate h1{font-family:'Cinzel Decorative',serif;font-size:17px;color:#f5c030;letter-spacing:3px;text-shadow:0 0 12px rgba(245,180,40,0.35);}
#nameplate p{font-family:'Cinzel',serif;font-size:9px;color:rgba(200,160,80,0.45);letter-spacing:4px;margin-top:2px;}
#viking-name-display{font-family:'Cinzel',serif;font-size:10px;color:#c8a050;letter-spacing:2px;margin-top:2px;}
#compass{position:absolute;top:18px;right:22px;width:70px;height:70px;}
#compass svg{width:100%;height:100%;filter:drop-shadow(0 0 8px rgba(245,180,40,0.38));}
#controls-hint{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:10px;align-items:center;}
.hint-key{background:rgba(5,2,1,0.82);border:1px solid rgba(200,140,30,0.28);border-radius:3px;padding:5px 12px;color:#f5c030;font-size:10px;letter-spacing:2px;font-family:'Cinzel',serif;}
#logout-btn{position:absolute;top:18px;left:22px;pointer-events:all;background:rgba(5,2,1,0.82);border:1px solid rgba(200,140,30,0.28);border-radius:3px;padding:6px 14px;color:rgba(200,160,80,0.55);font-size:9px;letter-spacing:2px;cursor:pointer;font-family:'Cinzel',serif;transition:color 0.2s,border-color 0.2s;}
#logout-btn:hover{color:#f5c030;border-color:rgba(200,140,30,0.6);}
#mobile-pad{position:absolute;bottom:34px;right:22px;display:none;pointer-events:all;flex-direction:column;align-items:center;gap:4px;}
.pad-row{display:flex;gap:4px;}
.pad-btn{width:50px;height:50px;background:rgba(5,2,1,0.88);border:1px solid rgba(200,140,30,0.32);border-radius:7px;color:#f5c030;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;font-family:sans-serif;}
.pad-btn:active{background:rgba(139,80,0,0.5);}
@media(max-width:768px){#mobile-pad{display:flex;}#controls-hint{display:none;}}
#fade-overlay{position:fixed;inset:0;z-index:200;background:#080402;opacity:0;pointer-events:none;transition:opacity 0.55s;}
#fade-overlay.visible{opacity:1;pointer-events:all;}
</style>

<script>
// ── Stars ──
const sc=document.getElementById('stars-canvas');
const sx=sc.getContext('2d');
function rsz(){sc.width=window.innerWidth;sc.height=window.innerHeight;}rsz();
window.addEventListener('resize',rsz);
const stars=Array.from({length:220},()=>({x:Math.random(),y:Math.random()*0.62,r:Math.random()*1.5+0.3,tw:Math.random()*Math.PI*2,sp:0.4+Math.random()*1.6}));
function drawStars(t){
  sx.clearRect(0,0,sc.width,sc.height);
  stars.forEach(s=>{
    const a=Math.max(0,0.38+Math.sin(t*s.sp+s.tw)*0.36);
    sx.beginPath();sx.arc(s.x*sc.width,s.y*sc.height,s.r,0,Math.PI*2);
    sx.fillStyle=`rgba(255,245,205,${a})`;sx.fill();
  });
  requestAnimationFrame(drawStars);
}drawStars(0);

// ── Login Logic ──
let playerName='',playerClan='';
const loadMsgs=['Forjando as longhouses...','Acendendo as fogueiras...','Despertando o drakkar...','Esculpindo runas antigas...','Invocando os espíritos...','Preparando o banquete...','Valhalla te aguarda!'];

function handleLogin(){
  const n=document.getElementById('viking-name').value.trim();
  const err=document.getElementById('login-error');
  if(!n){err.style.display='block';return;}
  err.style.display='none';
  playerName=n;
  playerClan=document.getElementById('clan-name').value.trim()||'Sem Clã';
  startLoading();
}
function handleGuest(){playerName='Errante';playerClan='Sem Clã';startLoading();}
document.getElementById('viking-name').addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});
document.getElementById('clan-name').addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});

function startLoading(){
  const fade=document.getElementById('fade-overlay');
  fade.classList.add('visible');
  setTimeout(()=>{
    document.getElementById('login-screen').style.display='none';
    const ls=document.getElementById('loading-screen');ls.style.display='flex';
    document.getElementById('loading-welcome').textContent=`Bem-vindo, ${playerName} do Clã ${playerClan}`;
    fade.classList.remove('visible');
    let prog=0,mi=0;
    const bar=document.getElementById('loading-bar');
    const msg=document.getElementById('loading-msg');
    const iv=setInterval(()=>{
      prog+=Math.random()*11+4;if(prog>100)prog=100;
      bar.style.width=prog+'%';
      if(mi<loadMsgs.length-1&&prog>mi*(100/loadMsgs.length))msg.textContent=loadMsgs[mi++];
      if(prog>=100){clearInterval(iv);msg.textContent=loadMsgs[loadMsgs.length-1];setTimeout(enterGame,600);}
    },150);
  },580);
}

function enterGame(){
  const fade=document.getElementById('fade-overlay');fade.classList.add('visible');
  setTimeout(()=>{
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('canvas-container').style.display='block';
    document.getElementById('ui-overlay').style.display='block';
    document.getElementById('viking-name-display').textContent=`${playerName}  ·  Clã ${playerClan}`;
    initGame();fade.classList.remove('visible');
  },580);
}

function handleLogout(){
  const fade=document.getElementById('fade-overlay');fade.classList.add('visible');
  setTimeout(()=>{
    document.getElementById('canvas-container').style.display='none';
    document.getElementById('ui-overlay').style.display='none';
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('loading-bar').style.width='0';
    fade.classList.remove('visible');
  },580);
}
</script>

    btn.addEventListener('touchend',e=>{e.preventDefault();keys['_'+dir]=false;},{passive:false});
    btn.addEventListener('mousedown',()=>keys['_'+dir]=true);
    btn.addEventListener('mouseup',()=>keys['_'+dir]=false);
  });

  const SPEED=5;let vikingAngle=0,walkPhase=0;
  const CAM=new THREE.Vector3(28,28,28);const camT=new THREE.Vector3(28,28,28);
  let lastTs=0;

  function animate(ts){
    requestAnimationFrame(animate);
    const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts;const t=ts/1000;
    let dx=0,dz=0;
    if(keys['ArrowUp']||keys['w']||keys['W']||keys['_forward'])dz-=1;
    if(keys['ArrowDown']||keys['s']||keys['S']||keys['_backward'])dz+=1;
    if(keys['ArrowLeft']||keys['a']||keys['A']||keys['_left'])dx-=1;
    if(keys['ArrowRight']||keys['d']||keys['D']||keys['_right'])dx+=1;
    const moving=dx!==0||dz!==0;
    if(moving){
      const ta=Math.atan2(dx,dz);let diff=ta-vikingAngle;
      while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
      vikingAngle+=diff*Math.min(dt*14,1);viking.rotation.y=vikingAngle;
      const l=Math.sqrt(dx*dx+dz*dz);
      viking.position.x=Math.max(-27,Math.min(27,viking.position.x+dx/l*SPEED*dt));
      viking.position.z=Math.max(-27,Math.min(27,viking.position.z+dz/l*SPEED*dt));
      walkPhase+=dt*10;
      legL.rotation.x=Math.sin(walkPhase)*.52;legR.rotation.x=-Math.sin(walkPhase)*.52;
      armL.rotation.x=-Math.sin(walkPhase)*.42;armR.rotation.x=Math.sin(walkPhase)*.42;
      viking.position.y=Math.abs(Math.sin(walkPhase))*.044;
    }else{
      torso.position.y=.85+Math.sin(t*1.4)*.012;
      legL.rotation.x=0;legR.rotation.x=0;armL.rotation.x=0;armR.rotation.x=0;
    }
    const vp=viking.position;
    camT.lerp(new THREE.Vector3(vp.x+CAM.x,CAM.y,vp.z+CAM.z),dt*4);
    camera.position.copy(camT);camera.lookAt(vp.x,1,vp.z);
    const needle=document.getElementById('compass-needle');
    if(needle)needle.setAttribute('transform',`rotate(${THREE.MathUtils.radToDeg(-vikingAngle)},36,36)`);
    fires.forEach(({fl,fl2,pt},i)=>{const f=Math.sin(t*8+i*2.3)*.18+Math.sin(t*13+i)*.09;fl.scale.y=1+f;fl2.scale.y=1+f*.5;pt.intensity=1.9+f*1.8;});
    totems.forEach(({fl,fl2,pt},i)=>{const f=Math.sin(t*9+i*3.1)*.15;fl.scale.y=1+f;fl2.scale.y=1+f*.5;pt.intensity=1.3+f*1.2;});
    forgeGlow.intensity=2.0+Math.sin(t*7)*.6;
    runeLight.intensity=0.7+Math.sin(t*2.2)*.35;
    river.position.y=.06+Math.sin(t*.7)*.018;
    clouds.forEach((c,i)=>c.position.x+=Math.sin(t*.08+i)*.007);
    renderer.render(scene,camera);
  }
  requestAnimationFrame(animate);

  window.addEventListener('resize',()=>{
    const a=window.innerWidth/window.innerHeight;camera.left=-cs*a;camera.right=cs*a;
    camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);
  });
};
</script>
</body>
</html>
