<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drakkar Village | Viking World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #ui {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; flex-direction: column; align-items: center;
    pointer-events: none;
  }
  #controls-hint {
    background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.7);
    padding: 8px 18px; border-radius: 20px; font-size: 13px; letter-spacing: 1px;
  }
  #dpad {
    display: none; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px);
    gap: 4px; pointer-events: all;
  }
  .dpad-btn {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: white; cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .dpad-btn:active { background: rgba(255,255,255,0.35); }
  .dpad-empty { background: transparent; border: none; }
  #title-card {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    text-align: center; pointer-events: none;
  }
  #title-card h1 {
    font-size: 1.4rem; font-weight: 800; letter-spacing: 4px; text-transform: uppercase;
    color: #fff; text-shadow: 0 0 20px rgba(255,180,50,0.8);
  }
  #title-card p { font-size: 0.7rem; letter-spacing: 3px; color: rgba(255,200,100,0.7); margin-top: 4px; }
  @media (max-width: 768px) { #dpad { display: grid; } #controls-hint { display: none; } }
</style>
</head>
<body>

<div id="title-card">
  <h1>⚔ Drakkar Village</h1>
  <p>Viking Mini World — WASD / Setas para mover</p>
</div>

<div id="ui">
  <div id="controls-hint">WASD / ↑↓←→ para mover</div>
  <div id="dpad">
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-up">▲</div>
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-left">◀</div>
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-right">▶</div>
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-down">▼</div>
    <div class="dpad-empty"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── SCENE ─────────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x87CEEB);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87CEEB, 35, 85);

const aspect = window.innerWidth / window.innerHeight;
const camSize = 12;
const camera = new THREE.OrthographicCamera(
  -camSize * aspect, camSize * aspect, camSize, -camSize, 0.1, 200
);
camera.position.set(20, 20, 20);
camera.lookAt(0, 0, 0);

// ─── LIGHTS ────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfff5e0, 0.65));

const sun = new THREE.DirectionalLight(0xfff0cc, 1.2);
sun.position.set(15, 25, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -28; sun.shadow.camera.right = 28;
sun.shadow.camera.top = 28;   sun.shadow.camera.bottom = -28;
sun.shadow.camera.far = 100;
sun.shadow.bias = -0.001;
scene.add(sun);
scene.add(Object.assign(new THREE.DirectionalLight(0xc8e8ff, 0.4), { position: { x:-10, y:10, z:-10 } }));

// ─── HELPERS ───────────────────────────────────────────────────────────────────
const M = {
  grass:   new THREE.MeshLambertMaterial({ color: 0x5db85d }),
  dirt:    new THREE.MeshLambertMaterial({ color: 0xb5894a }),
  wood:    new THREE.MeshLambertMaterial({ color: 0x8B5E3C }),
  woodDk:  new THREE.MeshLambertMaterial({ color: 0x5C3D1E }),
  thatch:  new THREE.MeshLambertMaterial({ color: 0xD4A843 }),
  thatchDk:new THREE.MeshLambertMaterial({ color: 0xB8902A }),
  stone:   new THREE.MeshLambertMaterial({ color: 0x9E9E9E }),
  stoneDk: new THREE.MeshLambertMaterial({ color: 0x656565 }),
  water:   new THREE.MeshLambertMaterial({ color: 0x4AA5D4, transparent: true, opacity: 0.85 }),
  fire:    new THREE.MeshLambertMaterial({ color: 0xFF6B1A, emissive: 0xFF4400, emissiveIntensity: 0.5 }),
  barrel:  new THREE.MeshLambertMaterial({ color: 0x6B3A1F }),
  sail:    new THREE.MeshLambertMaterial({ color: 0xEEEEEE, side: THREE.DoubleSide }),
  sailRed: new THREE.MeshLambertMaterial({ color: 0xCC2200, side: THREE.DoubleSide }),
  skin:    new THREE.MeshLambertMaterial({ color: 0xE8B88A }),
  hair:    new THREE.MeshLambertMaterial({ color: 0xC06020 }),
  beard:   new THREE.MeshLambertMaterial({ color: 0xB85520 }),
  helmet:  new THREE.MeshLambertMaterial({ color: 0xAAAAAA }),
  clothes: new THREE.MeshLambertMaterial({ color: 0x5C4A2A }),
  belt:    new THREE.MeshLambertMaterial({ color: 0x3A2810 }),
  axe:     new THREE.MeshLambertMaterial({ color: 0x888888 }),
  leaf:    new THREE.MeshLambertMaterial({ color: 0x3D9E3D }),
  leafDk:  new THREE.MeshLambertMaterial({ color: 0x2D7A2D }),
  dock:    new THREE.MeshLambertMaterial({ color: 0x7A5230 }),
  anvil:   new THREE.MeshLambertMaterial({ color: 0x444444 }),
};

function box(w,h,d,mat){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat); m.castShadow=true; m.receiveShadow=true; return m; }
function cyl(rt,rb,h,seg,mat){ const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat); m.castShadow=true; m.receiveShadow=true; return m; }
function cone(r,h,seg,mat){ const m=new THREE.Mesh(new THREE.ConeGeometry(r,h,seg),mat); m.castShadow=true; m.receiveShadow=true; return m; }
function sph(r,ws,hs,mat){ const m=new THREE.Mesh(new THREE.SphereGeometry(r,ws,hs),mat); m.castShadow=true; m.receiveShadow=true; return m; }
function add(parent,...children){ children.forEach(c=>parent.add(c)); return parent; }
function at(obj,x,y,z){ obj.position.set(x,y,z); return obj; }

// ─── GROUND ────────────────────────────────────────────────────────────────────
const ground = at(box(42,0.3,42,M.grass),0,-0.15,0);
ground.receiveShadow=true; scene.add(ground);

function path(w,d,x,z,ry=0){
  const p=box(w,0.06,d,M.dirt); p.position.set(x,0.02,z); p.rotation.y=ry;
  p.receiveShadow=true; scene.add(p);
}
path(3,15,0,0); path(14,3,0,0); path(3,6,-5,-4); path(4,3,2,5);

// River
const river=at(box(5,0.08,13,M.water),7.5,0.02,4); river.receiveShadow=true; scene.add(river);

// ─── LONGHOUSE ─────────────────────────────────────────────────────────────────
function longhouse(x,z,ry=0){
  const g=new THREE.Group();
  const wall=at(box(5,1.8,3,M.wood),0,0.9,0); g.add(wall);
  const roof=at(new THREE.Mesh(new THREE.CylinderGeometry(0,2.7,1.9,4),M.thatch),0,2.4,0);
  roof.rotation.y=Math.PI/4; roof.castShadow=true; g.add(roof);
  g.add(at(box(5.4,0.15,0.3,M.thatchDk),0,3.25,0));
  g.add(at(box(0.6,1.0,0.12,M.woodDk),0,0.5,1.51));
  [-1,1].forEach(s=>g.add(at(box(0.15,1.8,3,M.woodDk),s*2.5,0.9,0)));
  g.position.set(x,0,z); g.rotation.y=ry; scene.add(g);
}
longhouse(-5,-5,0.31); longhouse(4,-5,-0.16); longhouse(-6,3,Math.PI*0.5); longhouse(3,-8,0.25);

// ─── TOTEM ─────────────────────────────────────────────────────────────────────
function totem(x,z){
  const g=new THREE.Group();
  g.add(at(cyl(0.18,0.22,3.5,8,M.wood),0,1.75,0));
  g.add(at(box(0.5,0.5,0.5,M.woodDk),0,3.6,0));
  [-1,1].forEach(s=>{ const h=at(cone(0.08,0.4,6,M.stoneDk),s*0.3,3.9,0); h.rotation.z=s*0.5; g.add(h); });
  g.add(at(cyl(0.05,0.08,0.3,6,M.fire),0,4.1,0));
  g.position.set(x,0,z); scene.add(g);
}
totem(-1.5,-1.5); totem(1.5,1.5); totem(-3,3);

// ─── RUNE STONE ────────────────────────────────────────────────────────────────
function runeStone(x,z){
  const g=new THREE.Group();
  g.add(at(box(0.6,0.2,0.5,M.stoneDk),0,0.1,0));
  g.add(at(box(0.5,1.4,0.22,M.stone),0,0.9,0));
  [1.2,0.9,0.6].forEach(ry=>g.add(at(box(0.3,0.06,0.03,M.stoneDk),0,ry,0.12)));
  g.position.set(x,0,z); scene.add(g);
}
runeStone(0,-2);

// ─── FORGE ─────────────────────────────────────────────────────────────────────
function forge(x,z,ry=0){
  const g=new THREE.Group();
  g.add(at(box(2.5,0.8,2,M.stone),0,0.4,0));
  g.add(at(box(0.6,1.5,0.6,M.stoneDk),0.5,1.5,0));
  g.add(at(cyl(0.15,0.2,0.3,6,M.fire),0.5,1.0,0));
  g.add(at(box(0.65,0.32,0.38,M.anvil),-0.5,1.06,0));
  g.add(at(box(2.9,0.12,2.3,M.thatch),0,2.25,0));
  [[-1.1,-0.85],[1.1,-0.85],[-1.1,0.85],[1.1,0.85]].forEach(([px,pz])=>
    g.add(at(cyl(0.06,0.06,2.25,6,M.woodDk),px,1.12,pz)));
  g.position.set(x,0,z); g.rotation.y=ry; scene.add(g);
}
forge(6,-1,-0.31);

// ─── DRAKKAR ───────────────────────────────────────────────────────────────────
function drakkar(x,z){
  const g=new THREE.Group();
  const hull=new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.82,4.8,12,1,false,0,Math.PI),M.wood);
  hull.rotation.x=Math.PI; hull.position.y=0.42; hull.castShadow=true; g.add(hull);
  g.add(at(box(1.55,0.15,4.5,M.woodDk),0,0.8,0));
  const bow=at(box(0.28,0.95,0.38,M.wood),0,0.82,-2.2); bow.rotation.x=-0.42; g.add(bow);
  const stern=at(box(0.28,0.75,0.38,M.wood),0,0.72,2.1); stern.rotation.x=0.42; g.add(stern);
  g.add(at(cyl(0.06,0.06,3.6,8,M.woodDk),0,2.45,0));
  g.add(at(box(0.05,1.5,1.6,M.sail),0,2.55,0.35));
  [-0.42,0.42].forEach(oz=>g.add(at(box(0.07,1.5,0.46,M.sailRed),0,2.55,oz)));
  for(let i=-1.2;i<=1.2;i+=0.8){
    [-1,1].forEach(s=>{ const o=at(cyl(0.03,0.03,1.7,6,M.wood),s*1.05,0.52,i); o.rotation.z=s*0.52; g.add(o); });
  }
  g.add(at(sph(0.23,6,6,M.woodDk),0,1.32,-2.35));
  g.position.set(x,-0.1,z); g.rotation.y=Math.PI*0.15; scene.add(g);
}
drakkar(8.8,6.2);

// ─── DOCK ──────────────────────────────────────────────────────────────────────
function dock(x,z){
  const g=new THREE.Group();
  for(let i=-1.5;i<=1.5;i+=0.5){ g.add(at(box(0.46,0.1,3.2,M.dock),i,0.05,0)); }
  [[-1.5,-1.4],[1.5,-1.4],[-1.5,1.4],[1.5,1.4]].forEach(([px,pz])=>
    g.add(at(cyl(0.1,0.1,1.0,6,M.woodDk),px,0.1,pz)));
  g.position.set(x,0,z); scene.add(g);
}
dock(7.2,4.8);

// ─── BARRELS ───────────────────────────────────────────────────────────────────
function barrel(x,y,z,s=1){
  const g=new THREE.Group();
  g.add(at(cyl(0.22*s,0.22*s,0.52*s,10,M.barrel),0,0.26*s,0));
  [0.1,0.36].forEach(ry=>g.add(at(cyl(0.24*s,0.24*s,0.07*s,10,M.woodDk),0,ry*s,0)));
  g.position.set(x,y,z); scene.add(g);
}
barrel(-3.5,0,-4); barrel(-4.2,0,-4.2,0.8); barrel(2.5,0,-3.5);
barrel(3,0,2); barrel(5.5,0,-0.5,0.9); barrel(-7,0,2); barrel(-7.5,0,2.6,0.8);

// ─── TREES ─────────────────────────────────────────────────────────────────────
function tree(x,z,s=1){
  const g=new THREE.Group();
  g.add(at(cyl(0.15*s,0.22*s,1.3*s,7,M.woodDk),0,0.65*s,0));
  [0,0.55,1.05].forEach((oy,i)=>{
    const r=(1.35-i*0.28)*s;
    const l=cone(r,r*1.45,7,i===0?M.leaf:M.leafDk);
    l.position.y=(1.45+oy)*s; l.castShadow=true; g.add(l);
  });
  g.position.set(x,0,z); scene.add(g);
}
tree(-9,-7,1.3); tree(-10,-4,1.1); tree(-8,0,1.2); tree(-9,4,1.0);
tree(-8,7,1.4);  tree(-5,8,1.1);   tree(2,8,1.2);  tree(5,8,1.0);
tree(8,-4,1.3);  tree(8,-8,1.1);   tree(3,-10,1.2);tree(-3,-10,1.0); tree(10,2,0.9);

// ─── BUSHES ────────────────────────────────────────────────────────────────────
function bush(x,z){
  const g=new THREE.Group();
  g.add(sph(0.42,6,5,M.leaf));
  const s2=at(sph(0.28,5,4,M.leafDk),0.3,-0.1,0.2); g.add(s2);
  g.position.set(x,0.22,z); scene.add(g);
}
[-6,-4,-2,0,2,4,6].forEach(x=>bush(x-0.3,7.8));
bush(-7,-2); bush(-7,1); bush(7,-3); bush(7,0); bush(-4,6); bush(4,6);

// ─── TORCH POSTS ───────────────────────────────────────────────────────────────
function torchPost(x,z){
  const g=new THREE.Group();
  g.add(at(cyl(0.06,0.07,1.5,8,M.woodDk),0,0.75,0));
  g.add(at(cyl(0.1,0.08,0.22,8,M.wood),0,1.56,0));
  g.add(at(cyl(0.05,0.07,0.22,6,M.fire),0,1.82,0));
  g.position.set(x,0,z); scene.add(g);
}
torchPost(-1,0.5); torchPost(1,-0.5); torchPost(3,-2); torchPost(-2,2);

// ─── VIKING CHARACTER ──────────────────────────────────────────────────────────
const vik = new THREE.Group();

// body + belt
vik.add(at(box(0.56,0.72,0.36,M.clothes),0,0.86,0));
vik.add(at(box(0.58,0.1,0.38,M.belt),0,0.62,0));

// head
vik.add(at(box(0.38,0.38,0.36,M.skin),0,1.46,0));

// helmet
vik.add(at(box(0.43,0.15,0.4,M.helmet),0,1.69,0));
vik.add(at(sph(0.22,7,5,M.helmet),0,1.83,0));
[-1,1].forEach(s=>{ const h=at(cone(0.05,0.36,6,M.stoneDk),s*0.28,1.89,0); h.rotation.z=s*0.6; vik.add(h); });

// beard + hair
vik.add(at(box(0.3,0.22,0.1,M.beard),0,1.25,0.19));
vik.add(at(box(0.36,0.16,0.1,M.hair),0,1.43,-0.19));

// legs
[-1,1].forEach(s=>vik.add(at(box(0.2,0.52,0.22,M.woodDk),s*0.15,0.26,0)));
// arms
[-1,1].forEach(s=>vik.add(at(box(0.16,0.55,0.18,M.clothes),s*0.38,0.78,0)));

// axe on back
const axeH=at(cyl(0.03,0.03,0.72,6,M.wood),-0.38,0.9,-0.2); axeH.rotation.z=0.3; vik.add(axeH);
vik.add(at(box(0.22,0.18,0.06,M.axe),-0.28,1.19,-0.2));

vik.position.set(0,0,0);
scene.add(vik);

// ─── INPUT ─────────────────────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true; e.preventDefault();});
document.addEventListener('keyup',e=>keys[e.key]=false);

const dpadMap={'btn-up':'ArrowUp','btn-down':'ArrowDown','btn-left':'ArrowLeft','btn-right':'ArrowRight'};
Object.entries(dpadMap).forEach(([id,key])=>{
  const btn=document.getElementById(id);
  btn.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true;},{passive:false});
  btn.addEventListener('touchend',  e=>{e.preventDefault();keys[key]=false;},{passive:false});
  btn.addEventListener('mousedown', ()=>keys[key]=true);
  btn.addEventListener('mouseup',   ()=>keys[key]=false);
  btn.addEventListener('mouseleave',()=>keys[key]=false);
});

// ─── ANIMATE ───────────────────────────────────────────────────────────────────
const SPEED = 4;
let lastTime=0, walkCycle=0, t=0;
const flames=[];
scene.traverse(obj=>{ if(obj.material===M.fire) flames.push(obj); });

const camOffset = new THREE.Vector3(20,20,20);
const camTarget = new THREE.Vector3();

function animate(time){
  requestAnimationFrame(animate);
  const dt=Math.min((time-lastTime)/1000, 0.05);
  lastTime=time; t+=dt;

  let dx=0,dz=0;
  if(keys['w']||keys['W']||keys['ArrowUp'])   { dx-=1; dz-=1; }
  if(keys['s']||keys['S']||keys['ArrowDown'])  { dx+=1; dz+=1; }
  if(keys['a']||keys['A']||keys['ArrowLeft'])  { dx-=1; dz+=1; }
  if(keys['d']||keys['D']||keys['ArrowRight']) { dx+=1; dz-=1; }

  const len=Math.sqrt(dx*dx+dz*dz);
  if(len>0){
    dx/=len; dz/=len;
    vik.position.x=Math.max(-16,Math.min(16, vik.position.x+dx*SPEED*dt));
    vik.position.z=Math.max(-16,Math.min(16, vik.position.z+dz*SPEED*dt));
    vik.rotation.y=Math.atan2(dx,dz);
    walkCycle+=dt*8;
    vik.position.y=Math.abs(Math.sin(walkCycle))*0.06;
    vik.rotation.z=Math.sin(walkCycle*0.5)*0.04;
  } else {
    vik.position.y=0; vik.rotation.z=0;
  }

  // flame flicker
  flames.forEach((f,i)=>{
    f.scale.y=0.9+Math.sin(t*5+i*1.3)*0.15;
    f.scale.x=0.9+Math.cos(t*4+i)*0.1;
  });

  // smooth camera follow
  camTarget.copy(vik.position).add(camOffset);
  camera.position.lerp(camTarget, 0.08);
  camera.lookAt(vik.position);

  renderer.render(scene,camera);
}
animate(0);

// ─── RESIZE ────────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  const a=window.innerWidth/window.innerHeight;
  camera.left=-camSize*a; camera.right=camSize*a;
  camera.top=camSize; camera.bottom=-camSize;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
