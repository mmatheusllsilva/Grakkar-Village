<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valhalla's Gate — Mundo Viking</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0604; font-family: 'Cinzel', serif; color: #e0d0b0; }
        
        canvas { display: block; }
        #canvas-container { width: 100vw; height: 100vh; display: none; background: #7aafcc; }

        /* ── ESTRELAS DE FUNDO ── */
        #stars-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

        /* ── LOGIN SCREEN ── */
        #login-screen { 
            position: fixed; width: 100%; height: 100%; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .login-card {
            background: rgba(15, 10, 5, 0.95); border: 2px solid #8b5e3c; 
            padding: 40px; border-radius: 4px; text-align: center; width: 320px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; background: #1a1510; 
            border: 1px solid #4a3520; color: #f5c030; font-family: 'Cinzel';
        }
        button { 
            width: 100%; padding: 12px; background: #8b2020; color: white; 
            border: none; cursor: pointer; font-family: 'Cinzel'; font-weight: bold; margin-top: 10px;
        }
        button:hover { background: #aa2200; }

        /* ── LOADING SCREEN ── */
        #loading-screen { 
            position: fixed; width: 100%; height: 100%; background: #0a0604; 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20;
        }
        #loading-bar-container { width: 300px; height: 4px; background: #221a15; margin-top: 20px; }
        #loading-bar { width: 0%; height: 100%; background: #f5c030; box-shadow: 0 0 10px #f5c030; transition: width 0.2s; }

        /* ── HUD / UI ── */
        #ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 5; }
        #nameplate { position: absolute; top: 20px; left: 20px; pointer-events: auto; }
        #compass { position: absolute; top: 20px; right: 20px; width: 80px; height: 80px; }
        #logout-btn { position: absolute; bottom: 20px; left: 20px; width: auto; padding: 8px 15px; pointer-events: auto; }
        #mobile-pad { position: absolute; bottom: 20px; right: 20px; pointer-events: auto; }
        .pad-btn { width: 50px; height: 50px; background: rgba(0,0,0,0.5); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #4a3520; }

        /* ── FADE OVERLAY ── */
        #fade-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; opacity: 0; pointer-events: none; transition: opacity 0.6s; z-index: 100;
        }
        #fade-overlay.visible { opacity: 1; }
    </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div id="fade-overlay"></div>

<div id="login-screen">
    <div class="login-card">
        <h1 style="color:#f5c030; margin-bottom: 20px;">Valhalla's Gate</h1>
        <input type="text" id="viking-name" placeholder="Nome do Guerreiro">
        <input type="text" id="clan-name" placeholder="Nome do Clã (Opcional)">
        <p id="login-error" style="color:#ff4444; font-size: 12px; display:none; margin-bottom:10px;">Insira seu nome!</p>
        <button onclick="handleLogin()">ENTRAR EM MIDGARD</button>
        <button onclick="handleGuest()" style="background:#4a3520;">EXPLORAR COMO ERRANTE</button>
    </div>
</div>

<div id="loading-screen">
    <h2 id="loading-welcome" style="margin-bottom: 10px;">Iniciando Jornada...</h2>
    <p id="loading-msg" style="color: #8b5e3c;">Invocando os deuses...</p>
    <div id="loading-bar-container"><div id="loading-bar"></div></div>
</div>

<div id="canvas-container"></div>

<div id="ui-overlay">
  <div id="nameplate">
    <h1 style="font-size: 18px; color: #f5c030;">⚔ Aldeia Viking ⚔</h1>
    <div id="viking-name-display" style="font-size: 14px; margin-top: 5px;"></div>
  </div>
  
  <div id="compass">
    <svg viewBox="0 0 72 72">
      <circle cx="36" cy="36" r="34" fill="rgba(5,2,1,0.8)" stroke="#c88c1e" stroke-width="1.5"/>
      <text x="36" y="13" text-anchor="middle" fill="#f5c030" font-size="10" font-weight="bold">N</text>
      <polygon points="36,18 33,36 36,32 39,36" fill="#f5c030" id="compass-needle"/>
      <circle cx="36" cy="36" r="3" fill="#f5c030"/>
    </svg>
  </div>

  <button id="logout-btn" onclick="handleLogout()">← Sair</button>

  <div id="mobile-pad">
    <div style="text-align:center;"><div class="pad-btn" data-dir="forward">▲</div></div>
    <div>
      <div class="pad-btn" data-dir="left">◀</div>
      <div class="pad-btn" data-dir="backward">▼</div>
      <div class="pad-btn" data-dir="right">▶</div>
    </div>
  </div>
</div>

<script>
// ── Stars Background Logic ──
const sc=document.getElementById('stars-canvas');
const sx=sc.getContext('2d');
function rsz(){sc.width=window.innerWidth;sc.height=window.innerHeight;}rsz();
window.addEventListener('resize',rsz);
const stars=Array.from({length:220},()=>({x:Math.random(),y:Math.random()*0.62,r:Math.random()*1.5+0.3,tw:Math.random()*Math.PI*2,sp:0.4+Math.random()*1.6}));
function drawStars(t){
    sx.clearRect(0,0,sc.width,sc.height);
    stars.forEach(s=>{
        const a=Math.max(0,0.38+Math.sin(t*0.001*s.sp+s.tw)*0.36);
        sx.beginPath();sx.arc(s.x*sc.width,s.y*sc.height,s.r,0,Math.PI*2);
        sx.fillStyle=`rgba(255,245,205,${a})`;sx.fill();
    });
    requestAnimationFrame(drawStars);
}drawStars(0);

// ── Login & Transitions ──
let playerName='', playerClan='';
const loadMsgs=['Forjando as longhouses...','Acendendo as fogueiras...','Despertando o drakkar...','Esculpindo runas antigas...','Valhalla te aguarda!'];

function handleLogin(){
    const n=document.getElementById('viking-name').value.trim();
    if(!n){document.getElementById('login-error').style.display='block';return;}
    playerName=n;
    playerClan=document.getElementById('clan-name').value.trim()||'Sem Clã';
    startLoading();
}
function handleGuest(){playerName='Errante';playerClan='Sem Clã';startLoading();}

function startLoading(){
    document.getElementById('fade-overlay').classList.add('visible');
    setTimeout(()=>{
        document.getElementById('login-screen').style.display='none';
        document.getElementById('loading-screen').style.display='flex';
        document.getElementById('loading-welcome').textContent=`Bem-vindo, ${playerName}`;
        document.getElementById('fade-overlay').classList.remove('visible');
        
        let prog=0, mi=0;
        const iv=setInterval(()=>{
            prog += Math.random()*8+2;
            if(prog>=100){
                prog=100; clearInterval(iv);
                setTimeout(enterGame, 500);
            }
            document.getElementById('loading-bar').style.width=prog+'%';
            if(mi < loadMsgs.length && prog > (mi+1)*20) document.getElementById('loading-msg').textContent=loadMsgs[mi++];
        }, 100);
    }, 600);
}

function enterGame(){
    document.getElementById('fade-overlay').classList.add('visible');
    setTimeout(()=>{
        document.getElementById('loading-screen').style.display='none';
        document.getElementById('canvas-container').style.display='block';
        document.getElementById('ui-overlay').style.display='block';
        document.getElementById('viking-name-display').textContent=`${playerName} · Clã ${playerClan}`;
        initGame();
        document.getElementById('fade-overlay').classList.remove('visible');
    }, 600);
}

function handleLogout(){
    location.reload(); // Forma mais limpa de resetar o estado do Three.js
}
</script>

<script type="importmap">{"imports":{"three":"https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';
let inited=false;

window.initGame=function(){
  if(inited)return;inited=true;

  const container=document.getElementById('canvas-container');
  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.outputEncoding=THREE.sRGBEncoding;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  container.appendChild(renderer.domElement);

  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0x7aafcc);
  scene.fog=new THREE.Fog(0x90c0d8,38,92);

  const asp=window.innerWidth/window.innerHeight,cs=18;
  const camera=new THREE.OrthographicCamera(-cs*asp,cs*asp,cs,-cs,0.1,200);
  camera.position.set(28,28,28);camera.lookAt(0,0,0);

  scene.add(new THREE.AmbientLight(0xfff4e0,0.55));
  const sun=new THREE.DirectionalLight(0xfff4c0,1.3);
  sun.position.set(22,38,16);sun.castShadow=true;
  sun.shadow.mapSize.set(2048,2048);
  scene.add(sun);

  // Materiais
  const M={
    grass:new THREE.MeshLambertMaterial({color:0x5d9e3a}),
    grassDk:new THREE.MeshLambertMaterial({color:0x4a8030}),
    dirt:new THREE.MeshLambertMaterial({color:0xb07040}),
    wood:new THREE.MeshLambertMaterial({color:0x8b5e3c}),
    woodDk:new THREE.MeshLambertMaterial({color:0x6b4028}),
    roof:new THREE.MeshLambertMaterial({color:0x9b7020}),
    stone:new THREE.MeshLambertMaterial({color:0x8a8a7a}),
    stoneDk:new THREE.MeshLambertMaterial({color:0x6a6a62}),
    water:new THREE.MeshLambertMaterial({color:0x4488bb,transparent:true,opacity:0.82}),
    sand:new THREE.MeshLambertMaterial({color:0xc8a870}),
    fire:new THREE.MeshLambertMaterial({color:0xff8820,emissive:0xff5500,emissiveIntensity:0.9}),
    fireIn:new THREE.MeshLambertMaterial({color:0xffdd44,emissive:0xffaa00,emissiveIntensity:1.0}),
    trunk:new THREE.MeshLambertMaterial({color:0x7a4a1a}),
    leaves:new THREE.MeshLambertMaterial({color:0x3a7a1a}),
    leavesDk:new THREE.MeshLambertMaterial({color:0x2d6015}),
    snow:new THREE.MeshLambertMaterial({color:0xddeeff}),
    skin:new THREE.MeshLambertMaterial({color:0xd4956a}),
    cloth:new THREE.MeshLambertMaterial({color:0x7a3a1a}),
    hair:new THREE.MeshLambertMaterial({color:0xc06020}),
    metal:new THREE.MeshLambertMaterial({color:0x909090}),
    boat:new THREE.MeshLambertMaterial({color:0x7a3a10}),
    rune:new THREE.MeshLambertMaterial({color:0x606070}),
    runeGlow:new THREE.MeshLambertMaterial({color:0x80ffaa,emissive:0x40cc66,emissiveIntensity:0.7}),
    barrel:new THREE.MeshLambertMaterial({color:0x7a5020}),
    iron:new THREE.MeshLambertMaterial({color:0x707070}),
    ember:new THREE.MeshLambertMaterial({color:0xff4400,emissive:0xff2200,emissiveIntensity:1.0}),
    wattle:new THREE.MeshLambertMaterial({color:0xc8a870}),
    sail:new THREE.MeshLambertMaterial({color:0xeedd88}),
    sailRed:new THREE.MeshLambertMaterial({color:0xaa2200}),
    shield:new THREE.MeshLambertMaterial({color:0x8b2020})
  };

  function gm(geo,mat,x=0,y=0,z=0,rx=0,ry=0,rz=0){
      const m=new THREE.Mesh(geo,mat);m.position.set(x,y,z);m.rotation.set(rx,ry,rz);
      m.castShadow=true;m.receiveShadow=true;return m;
  }

  // Chão
  const gnd=new THREE.Mesh(new THREE.PlaneGeometry(90,90),M.grass);
  gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;scene.add(gnd);

  // Praça e Caminhos
  const plaza=gm(new THREE.CircleGeometry(4.2,12),M.dirt,0,0.015,0,-Math.PI/2);scene.add(plaza);

  // Rio
  const river=gm(new THREE.PlaneGeometry(7,36),M.water,-23,0.06,0,-Math.PI/2);scene.add(river);

  // Viking character
  const viking=new THREE.Group();
  viking.add(gm(new THREE.BoxGeometry(.58,.65,.36),M.cloth,0,.85,0)); // Corpo
  viking.add(gm(new THREE.BoxGeometry(.44,.44,.42),M.skin,0,1.5,0));  // Cabeça
  viking.add(gm(new THREE.BoxGeometry(.5,.22,.48),M.metal,0,1.74,0)); // Capacete
  const legL=gm(new THREE.BoxGeometry(.23,.55,.23),M.cloth,-.14,.27,0);
  const legR=gm(new THREE.BoxGeometry(.23,.55,.23),M.cloth,.14,.27,0);
  const armL=gm(new THREE.BoxGeometry(.2,.52,.2),M.cloth,-.4,.8,0);
  const armR=gm(new THREE.BoxGeometry(.2,.52,.2),M.cloth,.4,.8,0);
  viking.add(legL,legR,armL,armR);
  viking.position.set(0,0,0);
  scene.add(viking);

  // Campfires animadas
  function campfire(gx,gz){
    const g=new THREE.Group();
    const fl=gm(new THREE.ConeGeometry(0.22,0.56,7),M.fire,0,.46,0);
    const fl2=gm(new THREE.ConeGeometry(0.1,0.32,6),M.fireIn,0,.62,0);
    const pt=new THREE.PointLight(0xff8820,2.0,8);pt.position.set(0,.56,0);
    g.add(fl,fl2,pt);g.position.set(gx,0,gz);scene.add(g);
    return{fl,fl2,pt};
  }
  const fires=[campfire(2,2), campfire(-5, -5)];

  // Controles
  const keys={};
  window.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
  window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
  document.querySelectorAll('.pad-btn').forEach(btn=>{
    const d=btn.dataset.dir;
    btn.onmousedown=()=>keys[d]=true;btn.onmouseup=()=>keys[d]=false;
    btn.ontouchstart=e=>{e.preventDefault();keys[d]=true;};btn.ontouchend=()=>keys[d]=false;
  });

  const SPEED=6; let vikingAngle=0, walkPhase=0;
  const camOffset=new THREE.Vector3(28,28,28);
  let lastTs=0;

  function animate(ts){
    requestAnimationFrame(animate);
    const dt=Math.min((ts-lastTs)/1000, 0.05); lastTs=ts;
    
    let dx=0, dz=0;
    if(keys['w']||keys['arrowup']||keys['forward']) dz-=1;
    if(keys['s']||keys['arrowdown']||keys['backward']) dz+=1;
    if(keys['a']||keys['arrowleft']||keys['left']) dx-=1;
    if(keys['d']||keys['arrowright']||keys['right']) dx+=1;

    if(dx!==0||dz!==0){
      const targetAngle=Math.atan2(dx,dz);
      vikingAngle=targetAngle;
      viking.rotation.y=vikingAngle;
      viking.position.x+=dx*SPEED*dt;
      viking.position.z+=dz*SPEED*dt;
      
      walkPhase+=dt*12;
      legL.rotation.x=Math.sin(walkPhase)*0.5;
      legR.rotation.x=Math.sin(walkPhase + Math.PI)*0.5;
    } else {
        legL.rotation.x=0; legR.rotation.x=0;
    }

    // Camera segue suave
    camera.position.lerp(new THREE.Vector3(viking.position.x+28, 28, viking.position.z+28), 0.1);
    camera.lookAt(viking.position.x, 1, viking.position.z);

    // Animacao de fogo
    fires.forEach(f=>{
        const s=1+Math.sin(ts*0.01)*0.1;
        f.fl.scale.set(s,s,s);
        f.pt.intensity=2+Math.random()*0.5;
    });

    // Bussola
    const needle=document.getElementById('compass-needle');
    if(needle) needle.setAttribute('transform',`rotate(${THREE.MathUtils.radToDeg(-vikingAngle)},36,36)`);

    renderer.render(scene,camera);
  }
  requestAnimationFrame(animate);

  window.addEventListener('resize',()=>{
    const a=window.innerWidth/window.innerHeight;
    camera.left=-cs*a;camera.right=cs*a;camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });
};
</script>
</body>
</html>
